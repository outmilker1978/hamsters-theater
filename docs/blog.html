<body>

  <section class="section">
    <div class="section-inner">
      <h1 class="blog-title" data-i18n="blog.title">Новости и релизы</h1>

        <a href="https://github.com/outmilker1978/hamsters-theater/issues" target="_blank" data-i18n="footer.issues">Сообщить о проблеме</a>
        <a href="https://boosty.to/outmilker" target="_blank" class="donate-footer-link">Boosty</a>
        <a href="https://pay.cloudtips.ru/p/8485a55c" target="_blank" class="donate-footer-link">CloudTips</a>

    </div>

  <script>
    var lang = {};
    lang.ru = {
      'blog.title': 'Новости и релизы',
      'blog.sub': 'Все обновления программы TV Hamsters',
      'blog.loading': 'Загрузка...',
      'blog.back': 'На главную',
      'footer.issues': 'Сообщить о проблеме',
    };
    lang.en = {
      'blog.title': 'News & Releases',
      'blog.sub': 'All TV Hamsters updates',
      'blog.loading': 'Loading...',
      'blog.back': 'Back to main',
      'footer.issues': 'Report an issue',
    };

    var releaseNotesEN = {};
    releaseNotesEN['v1.7.2'] = 'TV Hamsters v1.7.2\n\nWhat\'s new\n\nWard No. Instead of boring "Room code: 1234" now "Ward No. 1234". Because hamsters gather in a ward, not in some "room".\nScenarios in the "About" modal Added a "Things to do" section with real use cases: home cinema, remote mentorship, connecting with those far away.\nDeep-link hamsters:// Registered the hamsters:// protocol. Now you can send friends links like hamsters://join?code=XXXX — the app will open and connect automatically. Handy for a future Telegram bot.\nDonations Two support buttons: Boosty and CloudTips — open in your system browser, not inside the app. We\'d appreciate any support for the project.\n\nFixes\n\nDonation links now open in the system browser (previously opened inside Electron, breaking auth).\nDesktop shortcut prompt now shows for the new version.';

    function fmtRN(text) {
      text = text.replace(/[🏥🎬🔗💸🐛]/g, '').replace(/\u00A0/g, ' ').replace(/ +/g, ' ').trim();
      text = text.replace(/\r\n/g, '\n');
      var lines = text.split('\n').filter(Boolean);
      var out = [];
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim().replace(/:$/, '');
        if (/^TV Hamsters v/i.test(line)) {
          out.push('<span class="rn-h1">' + line + '</span>');
        } else if (/^(Что нового|What'?s new|Исправления|Fixes)/i.test(line)) {
          out.push('<span class="rn-h2">' + line + '</span>');
        } else {
          out.push('<span class="rn-p">' + line + '</span>');
        }
      }
      return out.join('\n');
    }

    var currentLang = 'ru';
    function setLang(l) {
      currentLang = l;
      var els = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < els.length; i++) {
        var key = els[i].getAttribute('data-i18n');
        if (lang[l][key] !== undefined) {
          els[i].innerHTML = lang[l][key];
        }
      }
      var btns = document.querySelectorAll('.lang-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].getAttribute('data-lang') === l);
      }
      try { localStorage.setItem('tvh_lang', l); } catch(e) {}
      var t = document.querySelector('.blog-title');
      if (t) t.style.color = '#aa52dd';
    }

    var langBtns = document.querySelectorAll('.lang-btn');
    for (var i = 0; i < langBtns.length; i++) {
      langBtns[i].addEventListener('click', function() {
        setLang(this.getAttribute('data-lang'));
      });
    }

    try {
      var saved = localStorage.getItem('tvh_lang');
      if (saved && (saved === 'ru' || saved === 'en')) setLang(saved);
    } catch(e) {}

    fetch('https://api.github.com/repos/outmilker1978/hamsters-theater/releases?per_page=20')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var html = '';
        for (var i = 0; i < data.length; i++) {
          var rel = data[i];
          var ver = rel.tag_name;
          var date = rel.published_at ? rel.published_at.slice(0, 10) : '';
          var asset = rel.assets && rel.assets[0];
          var downloadUrl = asset ? asset.browser_download_url : '';
          var body = rel.body || '';
          var bodyEN = releaseNotesEN[ver] || body;
          var displayBody = currentLang === 'en' ? fmtRN(bodyEN) : fmtRN(body);
          var sizeMB = asset ? (asset.size / 1024 / 1024).toFixed(1) : '';

          html += '<div class="blog-card">';
          html += '<h2>' + ver + '</h2>';
          if (date) html += '<div class="blog-date">' + date + '</div>';
          if (body) html += '<div class="blog-body">' + displayBody + '</div>';
          if (downloadUrl) {
            html += '<div class="blog-download"><a href="' + downloadUrl + '">' +
              (currentLang === 'ru'
                ? 'Скачать .exe' + (sizeMB ? ' (' + sizeMB + ' МБ)' : '')
                : 'Download .exe' + (sizeMB ? ' (' + sizeMB + ' MB)' : '')) +
              '</a></div>';
          }
          html += '</div>';
        }
        document.getElementById('blogList').innerHTML = html;
      });
  </script>
