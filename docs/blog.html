    var releaseNotesEN = {};
    releaseNotesEN['v1.8.0'] = 'TV Hamsters v1.8.0\n\nWhat\'s new\n\nChat over video \u2014 text chat right next to the video in the room. Separate frameless window movable anywhere.\nFullscreen emoji reactions \u2014 emoji rain on the entire screen.\nFloating panel with camera windows.\nCompletely new settings with tabbed sections (and sub-tabs).\nReactions and chat \u2014 enable without restart, everything updates on the fly.\n"About" page with press release and author contacts.\n\nImprovements\n\nSynchronous EN/RU display \u2014 all columns match.\nChat reactions \u2014 preview first, then submenu.\nFloating panel now in English too.\nNotification bell for press release on the main window.\n\nFixes\n\nProtection against bugs during initial loading.';
    releaseNotesEN['v1.7.11'] = 'TV Hamsters v1.7.11\n\nNew main menu design: Rooms / Online / Ideas tabs now look cleaner and more informative.\n\nRoom card shows: participants, connection type, tech details.\n- Participants \u2014 who is in the room.\n- Online \u2014 online status.\n- Ideas \u2014 feature suggestions with donation buttons.\n\n"About" tab (press release) now shows a small cute avatar \u2014 just a face, no body. There\'s also a "Support" button.\nFor the "Online" section, rooms now display notifications in real time.\n\nKnown issues: Images in the menu with high resolution (like 640\u00d7480 at 20 FPS in PNG) may load slowly.';
    releaseNotesEN['v1.7.8'] = 'TV Hamsters v1.7.8\n\nAdded random room names \u2014 like in Zoom! No more dull room codes \u2014 each room gets a unique two-word name (e.g. "Happy Panda"). Hover over the name to see the technical room ID.\n\nAlso fixed: you can now join by address without filling it in manually.\n\nPlus: press the "Surprise me" button to get a random name from the list: cat, dog, fox, wolf and others.\n\nBy the way:\n- The room in the list now shows the generated name instead of the room code \u2014 much friendlier;\n- In the room: click "Share" to copy the invitation link with the name as a parameter \u2014 convenient, not a bug.';
    releaseNotesEN['v1.7.5'] = 'TV Hamsters v1.7.5\n\n- Desktop: Press Enter in the room code field now joins \u2014 just like in messengers\n- Desktop: New shortcut prompt logic \u2014 shows once (not every launch)\n- Mobile: "Share" button \u2014 now using native Web Share\n- Mobile: "Install on Android" button for PWA \u2014 correctly installs TV Hamsters on the home screen\n- Mobile: Room code below in Chrome \u2014 clipboard copy with code preview\n- Mobile: "Share" button in the room area \u2014 now displays correctly\n\nFull release notes on the blog:\n\nNew features\n- PWA site https://tvhamsters.outmilk.online/mobile/ with barcode scan\n- Button "+ Create room without registration" \u2014 one click (room in XXXX format)\n- Share room link \u2014 as a button "Copy link" and "Share with friends"\n- If there is a code in the link ?code=XXXX, automatic room connection\n\nIssues\n- Banner on mobile \u2014 doesn\'t always hide (need to click button first)\n\nRoom screen features (room by code)\n\nMicrophone\n- Toggle \u2014 enable/disable microphone\n- Right button on mic \u2014 context menu\n\nSpeaker\n- Default on \u2014 enable/disable speaker\n- Right button on speaker \u2014 toggle Push-to-Talk mode (PTT). Works until window closes\n\nTalk (PTT)\n- Press and hold \u2014 mic on, talk\n- Release \u2014 mic off\n- Right button on mic while in PTT mode \u2014 exit PTT\n\nScreen sharing\n- Top \u2014 start/stop screen sharing\n- Important: shared window hides immediately to avoid getting in the way\n\nRoom code\n- Top \u2014 copy/share current code\n- Copy button auto-updates after 3 seconds\n- History by room code \u2014 all created rooms\n\nAdditional features\n- Top \u2014 access settings and about (resources, OS, all windows)\n\nWindows and corner, if rooms are not found\n- The "Ideas" tab \u2192 blank \u2192 "Suggest"';
    releaseNotesEN['v1.7.4'] = 'Combined releases v1.7.3 + v1.7.4\n\n**v1.7.3**\n- All online: improved chat, rooms, completely new mobile version\n- Built a small website with pages, wrote a press release and published various links\n- Channel: added easter eggs, links to friends\' entertaining IT projects t.me/happy_spanish\n- Deep-link hamsters://\n\n**v1.7.4**\n- The room code is now shown without selection \u2014 immediately copyable. Much more convenient\n- Registered protocol hamsters:// \u2014 automatic interception and room connection via link\n- Published a website with articles and a blog page "TV Hamsters / Articles and blog" \u2014 all articles displayed with headings\n- Added "Read the article" button with photos and links\n- And of course bugs \ud83d\udca9 and \ud83d\udd27 in the room code (yes, there are cute cowards in the project... and apparently not only))))';
    releaseNotesEN['v1.7.2'] = 'TV Hamsters v1.7.2\n\nWhat\'s new\n\nWard No. Instead of boring "Room code: 1234" now "Ward No. 1234". Because hamsters gather in a ward, not in some "room".\nScenarios in the "About" modal Added a "Things to do" section with real use cases: home cinema, remote mentorship, connecting with those far away.\nDeep-link hamsters:// Registered the hamsters:// protocol. Now you can send friends links like hamsters://join?code=XXXX \u2014 the app will open and connect automatically. Handy for a future Telegram bot.\nDonations Two support buttons: Boosty and CloudTips \u2014 open in your system browser, not inside the app. We\'d appreciate any support for the project.\n\nFixes\n\nDonation links now open in the system browser (previously opened inside Electron, breaking auth).\nDesktop shortcut prompt now shows for the new version.';
    releaseNotesEN['v1.7.1'] = 'TV Hamsters v1.7.1\n\nFixed the floating panel. Rooms now work, share your screen, up to 5 people at the same time.';

    releaseNotesES['v1.8.0'] = 'TV Hamsters v1.8.0\n\nQu\u00e9 hay de nuevo\n\nChat sobre el video \u2014 chat de texto junto al video en la sala. Ventana frameless separada que se puede mover a cualquier lugar.\nReacciones a pantalla completa \u2014 lluvia de emojis en toda la pantalla.\nPanel flotante con ventanas de c\u00e1mara.\nConfiguraci\u00f3n completamente nueva con pesta\u00f1as (y subpesta\u00f1as).\nReacciones y chat \u2014 se activan sin reiniciar, todo se actualiza sobre la marcha.\nP\u00e1gina "Acerca de" con comunicado de prensa y contactos del autor.\n\nMejoras\n\nVisualizaci\u00f3n sincr\u00f3nica EN/RU \u2014 todas las columnas coinciden.\nReacciones del chat \u2014 vista previa primero, luego submen\u00fa.\nPanel flotante ahora tambi\u00e9n en ingl\u00e9s.\nCampana de notificaci\u00f3n para el comunicado en la ventana principal.\n\nCorrecciones\n\nProtecci\u00f3n contra errores durante la carga inicial.';
    releaseNotesES['v1.7.11'] = 'TV Hamsters v1.7.11\n\nNuevo dise\u00f1o del men\u00fa principal: las pesta\u00f1as Salas / En l\u00ednea / Ideas ahora se ven m\u00e1s limpias e informativas.\n\nLa tarjeta de sala muestra: participantes, tipo de conexi\u00f3n, detalles t\u00e9cnicos.\n- Participantes \u2014 qui\u00e9n est\u00e1 en la sala.\n- En l\u00ednea \u2014 estado en l\u00ednea.\n- Ideas \u2014 sugerencias de funciones con botones de donaci\u00f3n.\n\nLa pesta\u00f1a "Acerca de" (comunicado) ahora muestra un peque\u00f1o avatar bonito \u2014 solo una cara, sin cuerpo. Tambi\u00e9n hay un bot\u00f3n "Apoyar".\nPara la secci\u00f3n "En l\u00ednea", las salas ahora muestran notificaciones en tiempo real.\n\nProblemas conocidos: las im\u00e1genes en el men\u00fa con alta resoluci\u00f3n (como 640\u00d7480 a 20 FPS en PNG) pueden cargarse lentamente.';
    releaseNotesES['v1.7.8'] = 'TV Hamsters v1.7.8\n\n\u00a1Nombres de sala aleatorios a\u00f1adidos \u2014 como en Zoom! Ya no hay c\u00f3digos aburridos \u2014 cada sala recibe un nombre \u00fanico de dos palabras (ej. "Panda Feliz"). Al pasar el rat\u00f3n sobre el nombre, se ve el ID t\u00e9cnico.\n\nTambi\u00e9n corregido: ahora puedes unirte por direcci\u00f3n sin tener que rellenarla manualmente.\n\nAdem\u00e1s: presiona el bot\u00f3n "Sorpr\u00e9ndeme" para obtener un nombre aleatorio de la lista: gato, perro, zorro, lobo y otros.\n\nPor cierto:\n- La sala en la lista ahora muestra el nombre generado en lugar del c\u00f3digo \u2014 mucho m\u00e1s amigable;\n- En la sala: haz clic en "Compartir" para copiar el enlace con el nombre como par\u00e1metro \u2014 conveniente, no es un error.';
    releaseNotesES['v1.7.5'] = 'TV Hamsters v1.7.5\n\n- Escritorio: Presionar Enter en el campo de c\u00f3digo ahora entra \u2014 como en los mensajeros\n- Escritorio: Nueva l\u00f3gica de aviso de acceso directo \u2014 se muestra una vez (no cada inicio)\n- M\u00f3vil: Bot\u00f3n "Compartir" \u2014 ahora usando Web Share nativo\n- M\u00f3vil: Bot\u00f3n "Instalar en Android" para PWA \u2014 instala correctamente en la pantalla de inicio\n- M\u00f3vil: C\u00f3digo de sala abajo en Chrome \u2014 copia al portapapeles con vista previa\n- M\u00f3vil: Bot\u00f3n "Compartir" en el \u00e1rea de sala \u2014 ahora se muestra correctamente\n\nNotas completas en el blog:\n\nNuevas funciones\n- Sitio PWA https://tvhamsters.outmilk.online/mobile/ con escaneo de c\u00f3digo\n- Bot\u00f3n "+ Crear sala sin registro" \u2014 un clic (sala en formato XXXX)\n- Compartir enlace \u2014 bot\u00f3n "Copiar enlace" y "Compartir con amigos"\n- Si hay c\u00f3digo en el enlace ?code=XXXX, conexi\u00f3n autom\u00e1tica\n\nProblemas\n- Banner en m\u00f3vil \u2014 no siempre se oculta (hay que hacer clic primero)\n\nFunciones de la pantalla de sala\n\nMicr\u00f3fono\n- Alternar \u2014 activar/desactivar micr\u00f3fono\n- Bot\u00f3n derecho en el mic \u2014 men\u00fa contextual\n\nAltavoz\n- Activado por defecto \u2014 activar/desactivar\n- Bot\u00f3n derecho \u2014 alternar modo Push-to-Talk (PTT)\n\nHablar (PTT)\n- Mantener presionado \u2014 micr\u00f3fono encendido\n- Soltar \u2014 micr\u00f3fono apagado\n- Bot\u00f3n derecho en el mic en modo PTT \u2014 salir de PTT\n\nCompartir pantalla\n- Arriba \u2014 iniciar/detener\n- La ventana compartida se oculta inmediatamente\n\nC\u00f3digo de sala\n- Arriba \u2014 copiar/compartir c\u00f3digo actual\n- Bot\u00f3n de copiar se actualiza tras 3 segundos\n- Historial por c\u00f3digo \u2014 todas las salas creadas\n\nFunciones adicionales\n- Arriba \u2014 acceso a configuraci\u00f3n y acerca de\n\nSi no se encuentran salas\n- Pesta\u00f1a "Ideas" \u2192 en blanco \u2192 "Sugerir"';
    releaseNotesES['v1.7.4'] = 'Versiones combinadas v1.7.3 + v1.7.4\n\n**v1.7.3**\n- Todo en l\u00ednea: chat mejorado, salas, versi\u00f3n m\u00f3vil completamente nueva\n- Constru\u00ed un peque\u00f1o sitio web, escrib\u00ed un comunicado y publiqu\u00e9 enlaces\n- Canal: huevos de pascua, enlaces a proyectos IT de amigos t.me/happy_spanish\n- Enlace profundo hamsters://\n\n**v1.7.4**\n- El c\u00f3digo de sala ahora se muestra sin selecci\u00f3n \u2014 copia inmediata\n- Protocolo registrado hamsters:// \u2014 intercepci\u00f3n y conexi\u00f3n autom\u00e1tica mediante enlace\n- Sitio web con art\u00edculos y p\u00e1gina de blog "TV Hamsters / Art\u00edculos" \u2014 todos los art\u00edculos con encabezados\n- Bot\u00f3n "Leer el art\u00edculo" con fotos y enlaces\n- Y errores \ud83d\udca9 y \ud83d\udd27 en el c\u00f3digo (s\u00ed, hay cobardes lindos... y aparentemente no solo))))';
    releaseNotesES['v1.7.2'] = 'TV Hamsters v1.7.2\n\nQu\u00e9 hay de nuevo\n\nSala No. En lugar del aburrido "C\u00f3digo de sala: 1234" ahora "Sala No. 1234". Porque los h\u00e1msters se re\u00fanen en una sala, no en una "habitaci\u00f3n".\nEscenarios en el modal "Acerca de" Se a\u00f1adi\u00f3 una secci\u00f3n "Cosas que hacer" con casos de uso reales: cine en casa, mentor\u00eda remota, conectar con quienes est\u00e1n lejos.\nEnlace profundo hamsters:// Se registr\u00f3 el protocolo hamsters://. Ahora puedes enviar a tus amigos enlaces como hamsters://join?code=XXXX \u2014 la aplicaci\u00f3n se abrir\u00e1 y conectar\u00e1 autom\u00e1ticamente. \u00datil para un futuro bot de Telegram.\nDonaciones Dos botones de apoyo: Boosty y CloudTips \u2014 se abren en tu navegador del sistema, no dentro de la app. Agradecemos cualquier apoyo al proyecto.\n\nCorrecciones\n\nLos enlaces de donaci\u00f3n ahora se abren en el navegador del sistema (antes se abr\u00edan dentro de Electron, rompiendo la autenticaci\u00f3n).\nEl aviso de acceso directo ahora se muestra para la nueva versi\u00f3n.';
    releaseNotesES['v1.7.1'] = 'TV Hamsters v1.7.1\n\nPanel flotante corregido. Las salas ahora funcionan, comparte tu pantalla, hasta 5 personas al mismo tiempo.';

      return out.join('\n');

      currentLang = l;
      var els = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < els.length; i++) {
        var key = els[i].getAttribute('data-i18n');
        if (lang[l][key] !== undefined) {
          els[i].innerHTML = lang[l][key];
        }
      }
      var btns = document.querySelectorAll('.lang-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].getAttribute('data-lang') === l);
      }
      try { localStorage.setItem('tvh_lang', l); } catch(e) {}
      var t = document.querySelector('.blog-title');
      if (t) t.style.color = '#aa52dd';
    }

      var langBtns = document.querySelectorAll('.lang-btn');
    for (var i = 0; i < langBtns.length; i++) {
      langBtns[i].addEventListener('click', function() {
        setLang(this.getAttribute('data-lang'));
      });
    }

    try {
      var saved = localStorage.getItem('tvh_lang');
      if (saved && (saved === 'ru' || saved === 'en' || saved === 'es')) setLang(saved);
    } catch(e) {}

    var activeTab = 'all';
    function shareButtons(title) {
      var url = encodeURIComponent('https://tvhamsters.outmilk.online/blog.html');
      var t = encodeURIComponent(title);
      return '<div class="share-buttons">' +
        '<a class="share-btn" href="https://t.me/share/url?url=' + url + '&text=' + t + '" target="_blank" rel="noopener" title="Telegram">' +
        '<svg viewBox="0 0 24 24"><path d="M21.435 2.582a1.933 1.933 0 0 0-1.93-.503L3.408 6.759a1.92 1.92 0 0 0-1.384 1.522c-.142.75.355 1.704 1.003 2.101l5.033 3.094a1.304 1.304 0 0 0 1.61-.194l5.764-5.708a.3.3 0 0 1 .423.001.3.3 0 0 1 0 .424l-5.719 5.655a1.286 1.286 0 0 0-.19 1.6l3.11 5.055c.38.598.976.925 1.64.902a1.89 1.89 0 0 0 1.708-1.246L21.948 4.52a1.94 1.94 0 0 0-.513-1.938z"/></svg></a>' +
        '<a class="share-btn" href="https://vk.com/share.php?url=' + url + '&title=' + t + '" target="_blank" rel="noopener" title="VK">' +
        '<svg viewBox="0 0 24 24"><text x="12" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="12" fill="currentColor">VK</text></svg></a>' +
        '<a class="share-btn" href="https://twitter.com/intent/tweet?url=' + url + '&text=' + t + '" target="_blank" rel="noopener" title="X">' +
        '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a></div>';
    }
    function renderArticles() {
      var articles = currentLang === 'ru' ? articlesRU : (currentLang === 'es' ? articlesES : articlesEN);
      var html = '';
      for (var a = 0; a < articles.length; a++) {
        html += '<div class="article-card">';
        html += '<div class="article-badge">' + (currentLang === 'ru' ? '\u0421\u0442\u0430\u0442\u044C\u044F' : (currentLang === 'es' ? 'Art\u00edculo' : 'Article')) + '</div>';
        html += '<h2>' + articles[a].title + '</h2>';
        html += '<div class="blog-date">' + articles[a].date + '</div>';
        html += '<div class="article-text">' + articles[a].content + '</div>';
        html += '<div class="article-links">' + articles[a].links + '</div>';
        html += shareButtons(articles[a].title);
        html += '</div>';
      }
      return html;
    }
    function stripHtml(s) {
      return s.replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').replace(/&[a-z]+;/g, ' ').trim();
    }
    function truncate(s, max) {
      if (s.length <= max) return s;
      return s.substr(0, max).replace(/\s+\S*$/, '') + '...';
    }
    function bannerHtml() {
      var bnKey = 'ideas.banner';
      var bnBtnKey = 'ideas.banner_btn';
      return '<div class="ideas-banner">' +
        '<div class="ideas-banner-text">' + lang[currentLang][bnKey] + '</div>' +
        '<a class="ideas-banner-btn" href="/#feedbackForm">' + lang[currentLang][bnBtnKey] + '</a>' +
        '</div>';
    }
    function renderPreviews() {
      var articles = currentLang === 'ru' ? articlesRU : (currentLang === 'es' ? articlesES : articlesEN);
      var ideas = currentLang === 'ru' ? ideasRU : (currentLang === 'es' ? ideasES : ideasEN);
      var html = '<div class="section-sub-articles" style="margin-bottom:16px">' +
        lang[currentLang]['tab.articles'] + '</div>';

      for (var a = 0; a < articles.length; a++) {
        var stripped = stripHtml(articles[a].content);
        html += '<div class="article-card" style="padding:20px 24px">';
        html += '<div class="article-badge">' + (currentLang === 'ru' ? '\u0421\u0442\u0430\u0442\u044C\u044F' : (currentLang === 'es' ? 'Art\u00edculo' : 'Article')) + '</div>';
        html += '<h2 style="font-size:20px">' + articles[a].title + '</h2>';
        html += '<div class="blog-date">' + articles[a].date + '</div>';
        html += '<div class="blog-preview-body">' + truncate(stripped, 200) + '</div>';
        html += '<div class="blog-readmore"><a class="tab-switch" data-tab="articles">' +
          (currentLang === 'ru' ? '\u0427\u0438\u0442\u0430\u0442\u044C \u0434\u0430\u043B\u0435\u0435 \u2192' : (currentLang === 'es' ? 'Leer m\u00e1s \u2192' : 'Read more \u2192')) +
          '</a></div>' + shareButtons(articles[a].title) + '</div>';
      }

      html += '<div class="section-sub-articles" style="margin-top:28px;margin-bottom:16px">' +
        lang[currentLang]['tab.releases'] + '</div>';
      html += '<div class="blog-preview-body" style="margin-bottom:12px;color:#888">' +
        (currentLang === 'ru' ? '\u041F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0435 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0435\u043A\u0442\u0430' : (currentLang === 'es' ? '\u00DAltimas actualizaciones del proyecto' : 'Latest project updates')) +
        '</div><div class="blog-readmore" style="margin-bottom:24px"><a class="tab-switch" data-tab="releases">' +
        (currentLang === 'ru' ? '\u0412\u0441\u0435 \u0440\u0435\u043B\u0438\u0437\u044B \u2192' : (currentLang === 'es' ? 'Todos los lanzamientos \u2192' : 'All releases \u2192')) +
        '</a></div>';

      html += '<div class="section-sub-articles" style="margin-top:28px;margin-bottom:16px">' +
        lang[currentLang]['tab.ideas'] + '</div>';
      var count = Math.min(ideas.length, 4);
      for (var i = 0; i < count; i++) {
        html += '<div class="idea-card" style="padding:14px 20px">';
        html += '<div class="idea-status ' + ideas[i].status + '" style="width:28px;height:28px;font-size:12px">' +
          (ideas[i].status === 'done' ? '\u2713' : ideas[i].status === 'progress' ? '\u25CF' : '\u25CB') + '</div>';
        html += '<div class="idea-body"><h3 style="font-size:15px">' + ideas[i].title + '</h3>';
        if (ideas[i].desc) html += '<div class="idea-desc" style="font-size:13px">' + ideas[i].desc + '</div>';
        html += '</div></div>';
      }
      html += '<div class="blog-readmore"><a class="tab-switch" data-tab="ideas">' +
        (currentLang === 'ru' ? '\u0412\u0441\u0435 \u0438\u0434\u0435\u0438 \u2192' : (currentLang === 'es' ? 'Todas las ideas \u2192' : 'All ideas \u2192')) +
        '</a></div>';

      return html;
    }
    function renderIdeas() {
      var ideas = currentLang === 'ru' ? ideasRU : (currentLang === 'es' ? ideasES : ideasEN);
      var statusLabel = currentLang === 'ru'
        ? { done: '\u2713 \u0421\u0434\u0435\u043B\u0430\u043D\u043E', progress: '\u25CF \u0412 \u0440\u0430\u0431\u043E\u0442\u0435', planned: '\u25CB \u0412 \u043F\u043B\u0430\u043D\u0430\u0445' }
        : currentLang === 'es'
        ? { done: '\u2713 Hecho', progress: '\u25CF En progreso', planned: '\u25CB Planeado' }
        : { done: '\u2713 Done', progress: '\u25CF In progress', planned: '\u25CB Planned' };
      var html = '';
      for (var i = 0; i < ideas.length; i++) {
        var st = ideas[i].status;
        var ver = ideas[i].version ? ' v' + ideas[i].version : '';
        html += '<div class="idea-card">';
        html += '<div class="idea-status ' + st + '">' + (st === 'done' ? '\u2713' : st === 'progress' ? '\u25CF' : '\u25CB') + '</div>';
        html += '<div class="idea-body">';
        html += '<h3>' + ideas[i].title + '</h3>';
        html += '<div class="idea-meta"><span>' + statusLabel[st] + '</span>' + (ver ? '<span>' + ver + '</span>' : '') + '</div>';
        if (ideas[i].desc) html += '<div class="idea-desc">' + ideas[i].desc + '</div>';
        html += '</div></div>';
      }
      return html;
    }
    function renderBlog() {
      var list = document.getElementById('blogList');
      var bn = bannerHtml();
      var articlesHtml = renderArticles();
      var ideasHtml = renderIdeas();
      if (activeTab === 'all') {
        list.innerHTML = bn + renderPreviews();
      } else if (activeTab === 'articles') {
        list.innerHTML = bn + articlesHtml;
      } else if (activeTab === 'ideas') {
        list.innerHTML = bn + ideasHtml;
      } else if (activeTab === 'releases') {
        fetch('https://api.github.com/repos/outmilker1978/hamsters-theater/releases?per_page=20')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var html = '';
            for (var i = 0; i < data.length; i++) {
              var rel = data[i];
              var ver = rel.tag_name;
              var date = rel.published_at ? rel.published_at.slice(0, 10) : '';
              var asset = rel.assets && rel.assets[0];
              var downloadUrl = asset ? asset.browser_download_url : '';
              var body = rel.body || '';
              var bodyEN = releaseNotesEN[ver] || body;
              var displayBody = currentLang === 'ru' ? fmtRN(body) : (currentLang === 'es' && releaseNotesES[ver] ? fmtRN(releaseNotesES[ver]) : fmtRN(bodyEN));
              var sizeMB = asset ? (asset.size / 1024 / 1024).toFixed(1) : '';
              html += '<div class="blog-card">';
              html += '<h2>' + ver + '</h2>';
              if (date) html += '<div class="blog-date">' + date + '</div>';
              if (body) html += '<div class="blog-body">' + displayBody + '</div>';
              if (downloadUrl && i === 0) {
                html += '<div class="blog-download"><a href="' + downloadUrl + '">' +
                  (currentLang === 'ru'
                    ? '\u0421\u043A\u0430\u0447\u0430\u0442\u044C .exe' + (sizeMB ? ' (' + sizeMB + ' \u041C\u0411)' : '')
                    : (currentLang === 'es'
                      ? 'Descargar .exe' + (sizeMB ? ' (' + sizeMB + ' MB)' : '')
                      : 'Download .exe' + (sizeMB ? ' (' + sizeMB + ' MB)' : ''))) +
                  '</a></div>';
              }
              html += '</div>';
            }
              list.innerHTML = bn + html;
            });
        } else {
          fetch('https://api.github.com/repos/outmilker1978/hamsters-theater/releases?per_page=20')
            .then(function(r) { return r.json(); })
            .then(function(data) {
              var html = '';
              for (var i = 0; i < data.length; i++) {
                var rel = data[i];
                var ver = rel.tag_name;
                var date = rel.published_at ? rel.published_at.slice(0, 10) : '';
                var asset = rel.assets && rel.assets[0];
                var downloadUrl = asset ? asset.browser_download_url : '';
                var body = rel.body || '';
                var bodyEN = releaseNotesEN[ver] || body;
                var displayBody = currentLang === 'ru' ? fmtRN(body) : (currentLang === 'es' && releaseNotesES[ver] ? fmtRN(releaseNotesES[ver]) : fmtRN(bodyEN));
                var sizeMB = asset ? (asset.size / 1024 / 1024).toFixed(1) : '';
                html += '<div class="blog-card">';
                html += '<h2>' + ver + '</h2>';
                if (date) html += '<div class="blog-date">' + date + '</div>';
                if (body) html += '<div class="blog-body">' + displayBody + '</div>';
                if (downloadUrl && i === 0) {
                  html += '<div class="blog-download"><a href="' + downloadUrl + '">' +
                    (currentLang === 'ru'
                      ? '\u0421\u043A\u0430\u0447\u0430\u0442\u044C .exe' + (sizeMB ? ' (' + sizeMB + ' \u041C\u0411)' : '')
                      : (currentLang === 'es'
                        ? 'Descargar .exe' + (sizeMB ? ' (' + sizeMB + ' MB)' : '')
                        : 'Download .exe' + (sizeMB ? ' (' + sizeMB + ' MB)' : ''))) +
                    '</a></div>';
                }
                html += '</div>';
              }
              list.innerHTML = bn + articlesHtml + html;
            });
        }
      // i18n tab labels
      var tabBtns = document.querySelectorAll('.tab-btn');
      for (var i = 0; i < tabBtns.length; i++) {
        var key = tabBtns[i].getAttribute('data-i18n');
        if (lang[currentLang] && lang[currentLang][key] !== undefined) {
          tabBtns[i].innerHTML = lang[currentLang][key];
        }
      }
      generateSchema();
    }
    function generateSchema() {
      var articles = currentLang === 'ru' ? articlesRU : (currentLang === 'es' ? articlesES : articlesEN);
      var items = [];
      for (var i = 0; i < articles.length; i++) {
        items.push({
          '@type': 'BlogPosting',
          'headline': articles[i].title,
          'datePublished': articles[i].date,
          'description': stripHtml(articles[i].content).substr(0, 200),
          'url': 'https://tvhamsters.outmilk.online/blog.html',
          'author': { '@type': 'Person', 'name': 'Outmilker' },
          'publisher': { '@type': 'Organization', 'name': 'TV Hamsters' }
        });
      }
      var schema = {
        '@context': 'https://schema.org',
        '@graph': items
      };
      var el = document.getElementById('ldJson');
      if (!el) {
        el = document.createElement('script');
        el.id = 'ldJson';
        el.type = 'application/ld+json';
        document.head.appendChild(el);
      }
      el.textContent = JSON.stringify(schema);
    }
    function switchTab(tab) {
      activeTab = tab;
      var allBtns = document.querySelectorAll('.tab-btn');
      for (var j = 0; j < allBtns.length; j++) {
        allBtns[j].classList.toggle('active', allBtns[j].getAttribute('data-tab') === tab);
      }
      renderBlog();
    }
    // Tab switching
    var tabBtns = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < tabBtns.length; i++) {
      tabBtns[i].addEventListener('click', function() {
        switchTab(this.getAttribute('data-tab'));
      });
    }
    // "Подробнее" links in previews
    document.getElementById('blogList').addEventListener('click', function(e) {
      var t = e.target;
      while (t && t !== this) {
        if (t.classList && t.classList.contains('tab-switch')) {
          switchTab(t.getAttribute('data-tab'));
          e.preventDefault();
          return;
        }
        t = t.parentNode;
      }
    });
    // Override setLang to re-render
    var origSetLang2 = setLang;
    setLang = function(l) {
      origSetLang2(l);
      renderBlog();
    };
    renderBlog();
  </script>
</body>
</html>
