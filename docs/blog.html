    function fmtRN(text) {
      text = text.replace(/[🏥🎬🔗💸🐛]/g, '').replace(/\u00A0/g, ' ').replace(/ +/g, ' ').trim();
      text = text.replace(/\r\n/g, '\n');
      var lines = text.split('\n').filter(Boolean);
      var out = [];
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim().replace(/:$/, '');
        if (/^TV Hamsters v/i.test(line)) {
          out.push('<span class="rn-h1">' + line + '</span>');
        } else if (/^(Что нового|What'?s new|Исправления|Fixes)/i.test(line)) {
          out.push('<span class="rn-h2">' + line + '</span>');
        } else {
          out.push('<span class="rn-p">' + line + '</span>');
        }
      }
      return out.join('\n');
    }

    var currentLang = 'ru';
    function setLang(l) {
      currentLang = l;
      var els = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < els.length; i++) {
        var key = els[i].getAttribute('data-i18n');
        if (lang[l][key] !== undefined) {
          els[i].innerHTML = lang[l][key];
        }

      var btns = document.querySelectorAll('.lang-btn');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].getAttribute('data-lang') === l);
      }
      try { localStorage.setItem('tvh_lang', l); } catch(e) {}
      var t = document.querySelector('.blog-title');
      if (t) t.style.color = '#aa52dd';
    }

      var langBtns = document.querySelectorAll('.lang-btn');
    for (var i = 0; i < langBtns.length; i++) {
      langBtns[i].addEventListener('click', function() {
        setLang(this.getAttribute('data-lang'));
      });
    }

    try {
      var saved = localStorage.getItem('tvh_lang');
      if (saved && (saved === 'ru' || saved === 'en')) setLang(saved);
    } catch(e) {}

    var activeTab = 'all';
    function shareButtons(title) {

        '<a class="share-btn" href="https://twitter.com/intent/tweet?url=' + url + '&text=' + t + '" target="_blank" rel="noopener" title="X">' +
        '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a></div>';
    }
    function renderArticles() {
      var articles = currentLang === 'en' ? articlesEN : articlesRU;
      var html = '';
      for (var a = 0; a < articles.length; a++) {
        html += '<div class="article-card">';
        html += '<div class="article-badge">' + (currentLang === 'ru' ? '\u0421\u0442\u0430\u0442\u044C\u044F' : 'Article') + '</div>';
        html += '<h2>' + articles[a].title + '</h2>';
        html += '<div class="blog-date">' + articles[a].date + '</div>';
        html += '<div class="article-text">' + articles[a].content + '</div>';
        html += '<div class="article-links">' + articles[a].links + '</div>';
        html += shareButtons(articles[a].title);
        html += '</div>';
      }
      return html;
    }
    function stripHtml(s) {
      return s.replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').replace(/&[a-z]+;/g, ' ').trim();
    }
    function truncate(s, max) {
      if (s.length <= max) return s;
      return s.substr(0, max).replace(/\s+\S*$/, '') + '...';
    }
    function bannerHtml() {
      var bnKey = 'ideas.banner';
      var bnBtnKey = 'ideas.banner_btn';
      return '<div class="ideas-banner">' +
        '<div class="ideas-banner-text">' + lang[currentLang][bnKey] + '</div>' +
        '<a class="ideas-banner-btn" href="/#feedbackForm">' + lang[currentLang][bnBtnKey] + '</a>' +
        '</div>';
    }
    function renderPreviews() {
      var articles = currentLang === 'en' ? articlesEN : articlesRU;
      var ideas = currentLang === 'en' ? ideasEN : ideasRU;
      var html = '<div class="section-sub-articles" style="margin-bottom:16px">' +
        lang[currentLang]['tab.articles'] + '</div>';

      for (var a = 0; a < articles.length; a++) {
        var stripped = stripHtml(articles[a].content);
        html += '<div class="article-card" style="padding:20px 24px">';
        html += '<div class="article-badge">' + (currentLang === 'ru' ? '\u0421\u0442\u0430\u0442\u044C\u044F' : 'Article') + '</div>';
        html += '<h2 style="font-size:20px">' + articles[a].title + '</h2>';
        html += '<div class="blog-date">' + articles[a].date + '</div>';
        html += '<div class="blog-preview-body">' + truncate(stripped, 200) + '</div>';
        html += '<div class="blog-readmore"><a class="tab-switch" data-tab="articles">' +
          (currentLang === 'ru' ? '\u0427\u0438\u0442\u0430\u0442\u044C \u0434\u0430\u043B\u0435\u0435 \u2192' : 'Read more \u2192') +
          '</a></div>' + shareButtons(articles[a].title) + '</div>';
      }

      html += '<div class="section-sub-articles" style="margin-top:28px;margin-bottom:16px">' +
        lang[currentLang]['tab.releases'] + '</div>';
      html += '<div class="blog-preview-body" style="margin-bottom:12px;color:#888">' +
        (currentLang === 'ru' ? '\u041F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0435 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0435\u043A\u0442\u0430' : 'Latest project updates') +
        '</div><div class="blog-readmore" style="margin-bottom:24px"><a class="tab-switch" data-tab="releases">' +
        (currentLang === 'ru' ? '\u0412\u0441\u0435 \u0440\u0435\u043B\u0438\u0437\u044B \u2192' : 'All releases \u2192') +
        '</a></div>';

      html += '<div class="section-sub-articles" style="margin-top:28px;margin-bottom:16px">' +
        lang[currentLang]['tab.ideas'] + '</div>';
      var count = Math.min(ideas.length, 4);
      for (var i = 0; i < count; i++) {
        html += '<div class="idea-card" style="padding:14px 20px">';
        html += '<div class="idea-status ' + ideas[i].status + '" style="width:28px;height:28px;font-size:12px">' +
          (ideas[i].status === 'done' ? '\u2713' : ideas[i].status === 'progress' ? '\u25CF' : '\u25CB') + '</div>';
        html += '<div class="idea-body"><h3 style="font-size:15px">' + ideas[i].title + '</h3>';
        if (ideas[i].desc) html += '<div class="idea-desc" style="font-size:13px">' + ideas[i].desc + '</div>';
        html += '</div></div>';
      }
      html += '<div class="blog-readmore"><a class="tab-switch" data-tab="ideas">' +
        (currentLang === 'ru' ? '\u0412\u0441\u0435 \u0438\u0434\u0435\u0438 \u2192' : 'All ideas \u2192') +
        '</a></div>';

      return html;
    }
    function renderIdeas() {
      var ideas = currentLang === 'en' ? ideasEN : ideasRU;
      var statusLabel = currentLang === 'ru'
        ? { done: '\u2713 \u0421\u0434\u0435\u043B\u0430\u043D\u043E', progress: '\u25CF \u0412 \u0440\u0430\u0431\u043E\u0442\u0435', planned: '\u25CB \u0412 \u043F\u043B\u0430\u043D\u0430\u0445' }
        : { done: '\u2713 Done', progress: '\u25CF In progress', planned: '\u25CB Planned' };
      var html = '';
      for (var i = 0; i < ideas.length; i++) {
        var st = ideas[i].status;
        var ver = ideas[i].version ? ' v' + ideas[i].version : '';
        html += '<div class="idea-card">';
        html += '<div class="idea-status ' + st + '">' + (st === 'done' ? '\u2713' : st === 'progress' ? '\u25CF' : '\u25CB') + '</div>';
        html += '<div class="idea-body">';
        html += '<h3>' + ideas[i].title + '</h3>';
        html += '<div class="idea-meta"><span>' + statusLabel[st] + '</span>' + (ver ? '<span>' + ver + '</span>' : '') + '</div>';
        if (ideas[i].desc) html += '<div class="idea-desc">' + ideas[i].desc + '</div>';
        html += '</div></div>';
      }
      return html;
    }
    function renderBlog() {
      var list = document.getElementById('blogList');
      var bn = bannerHtml();
      var articlesHtml = renderArticles();
      var ideasHtml = renderIdeas();
      if (activeTab === 'all') {
        list.innerHTML = bn + renderPreviews();
      } else if (activeTab === 'articles') {
        list.innerHTML = bn + articlesHtml;
      } else if (activeTab === 'ideas') {
        list.innerHTML = bn + ideasHtml;
      } else if (activeTab === 'releases') {
        fetch('https://api.github.com/repos/outmilker1978/hamsters-theater/releases?per_page=20')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var html = '';
            for (var i = 0; i < data.length; i++) {
              var rel = data[i];
              var ver = rel.tag_name;
              var date = rel.published_at ? rel.published_at.slice(0, 10) : '';
              var asset = rel.assets && rel.assets[0];
              var downloadUrl = asset ? asset.browser_download_url : '';
              var body = rel.body || '';
              var bodyEN = releaseNotesEN[ver] || body;
              var displayBody = currentLang === 'en' ? fmtRN(bodyEN) : fmtRN(body);
              var sizeMB = asset ? (asset.size / 1024 / 1024).toFixed(1) : '';
              html += '<div class="blog-card">';
              html += '<h2>' + ver + '</h2>';
              if (date) html += '<div class="blog-date">' + date + '</div>';
              if (body) html += '<div class="blog-body">' + displayBody + '</div>';
              if (downloadUrl && i === 0) {
                html += '<div class="blog-download"><a href="' + downloadUrl + '">' +
                  (currentLang === 'ru'
                    ? '\u0421\u043A\u0430\u0447\u0430\u0442\u044C .exe' + (sizeMB ? ' (' + sizeMB + ' \u041C\u0411)' : '')
                    : 'Download .exe' + (sizeMB ? ' (' + sizeMB + ' MB)' : '')) +
                  '</a></div>';
              }
              html += '</div>';
            }
              list.innerHTML = bn + html;
            });
        } else {
          fetch('https://api.github.com/repos/outmilker1978/hamsters-theater/releases?per_page=20')
            .then(function(r) { return r.json(); })
            .then(function(data) {
              var html = '';
              for (var i = 0; i < data.length; i++) {
                var rel = data[i];
                var ver = rel.tag_name;
                var date = rel.published_at ? rel.published_at.slice(0, 10) : '';
                var asset = rel.assets && rel.assets[0];
                var downloadUrl = asset ? asset.browser_download_url : '';
                var body = rel.body || '';
                var bodyEN = releaseNotesEN[ver] || body;
                var displayBody = currentLang === 'en' ? fmtRN(bodyEN) : fmtRN(body);
                var sizeMB = asset ? (asset.size / 1024 / 1024).toFixed(1) : '';
                html += '<div class="blog-card">';
                html += '<h2>' + ver + '</h2>';
                if (date) html += '<div class="blog-date">' + date + '</div>';
                if (body) html += '<div class="blog-body">' + displayBody + '</div>';
                if (downloadUrl && i === 0) {
                  html += '<div class="blog-download"><a href="' + downloadUrl + '">' +
                    (currentLang === 'ru'
                      ? '\u0421\u043A\u0430\u0447\u0430\u0442\u044C .exe' + (sizeMB ? ' (' + sizeMB + ' \u041C\u0411)' : '')
                      : 'Download .exe' + (sizeMB ? ' (' + sizeMB + ' MB)' : '')) +
                    '</a></div>';
                }
                html += '</div>';
              }
              list.innerHTML = bn + articlesHtml + html;
            });
        }
      // i18n tab labels
      var tabBtns = document.querySelectorAll('.tab-btn');
      for (var i = 0; i < tabBtns.length; i++) {
        var key = tabBtns[i].getAttribute('data-i18n');
        if (lang[currentLang] && lang[currentLang][key] !== undefined) {
          tabBtns[i].innerHTML = lang[currentLang][key];
        }
      }
      generateSchema();
    }
    function generateSchema() {
      var articles = currentLang === 'en' ? articlesEN : articlesRU;
      var items = [];
      for (var i = 0; i < articles.length; i++) {
        items.push({
          '@type': 'BlogPosting',
          'headline': articles[i].title,
          'datePublished': articles[i].date,
          'description': stripHtml(articles[i].content).substr(0, 200),
          'url': 'https://tvhamsters.outmilk.online/blog.html',
          'author': { '@type': 'Person', 'name': 'Outmilker' },
          'publisher': { '@type': 'Organization', 'name': 'TV Hamsters' }
        });
      }
      var schema = {
        '@context': 'https://schema.org',
        '@graph': items
      };
      var el = document.getElementById('ldJson');
      if (!el) {
        el = document.createElement('script');
        el.id = 'ldJson';
        el.type = 'application/ld+json';
        document.head.appendChild(el);
      }
      el.textContent = JSON.stringify(schema);
    }
    function switchTab(tab) {
      activeTab = tab;
      var allBtns = document.querySelectorAll('.tab-btn');
      for (var j = 0; j < allBtns.length; j++) {
        allBtns[j].classList.toggle('active', allBtns[j].getAttribute('data-tab') === tab);
      }
      renderBlog();
    }
    // Tab switching
    var tabBtns = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < tabBtns.length; i++) {
      tabBtns[i].addEventListener('click', function() {
        switchTab(this.getAttribute('data-tab'));
      });
    }
    // "Подробнее" links in previews
    document.getElementById('blogList').addEventListener('click', function(e) {
      var t = e.target;
      while (t && t !== this) {
        if (t.classList && t.classList.contains('tab-switch')) {
          switchTab(t.getAttribute('data-tab'));
          e.preventDefault();
          return;
        }
        t = t.parentNode;
      }
    });
    // Override setLang to re-render
    var origSetLang2 = setLang;
    setLang = function(l) {
      origSetLang2(l);
      renderBlog();
    };
