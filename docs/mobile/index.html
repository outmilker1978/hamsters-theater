<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/icon256.png">
<title>TV Hamsters</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div id="landing">
  <div class="brand">
    <img src="/icon.png" alt="" class="brand-icon">
    <span class="brand-name">TV Hamsters</span>
  </div>
  <p class="brand-sub">Смотрите видео вместе</p>
  <div class="code-section">
    <input type="text" id="roomCodeInput" placeholder="Код комнаты" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">
    <button id="joinRoomBtn" class="btn-primary">Войти в комнату</button>
  </div>
  <div class="divider"><span>или</span></div>
  <button id="createRoomBtn" class="btn-secondary">+ Создать новую комнату</button>
  <div id="error"></div>
</div>

<div id="room">
  <div id="roomHeader">
    <div class="header-left">
      <span class="room-label">Палата</span>
      <span id="roomCode"></span>
    </div>
    <button id="leaveBtn">Выйти</button>
  </div>
  <div id="faces">
    <video id="localVideo" autoplay muted playsinline></video>
    <div id="screenContainer"><video id="screenVideo" autoplay playsinline></video></div>
    <div id="peerList"></div>
    <div id="screenshareBadge">Кто-то делится экраном</div>
  </div>
  <div id="controls">
    <button id="camBtn" class="ctrl-btn">📷</button>
    <button id="micBtn" class="ctrl-btn">🎤</button>
  </div>
  <div id="statusToast" style="display:none"></div>
</div>

<script src="socket.io.min.js"></script>
<script src="app.js?v=3"></script>
</body>
</html>
