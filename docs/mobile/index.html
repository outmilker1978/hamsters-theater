<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/icon256.png">
<title>TV Hamsters</title>
<link rel="stylesheet" href="style.css?v=13">
</head>
<body>
<div id="landing">
  <div class="brand">
    <img src="/icon.png" alt="" class="brand-icon">
    <span class="brand-name">TV Hamsters</span>
  </div>
  <p class="brand-sub">Смотрите видео вместе</p>
  <div class="code-section">
    <input type="text" id="roomCodeInput" placeholder="Код комнаты" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">
    <button id="joinRoomBtn" class="btn-primary">Войти в комнату</button>
  </div>
  <div class="divider"><span>или</span></div>
  <button id="createRoomBtn" class="btn-secondary">+ Создать новую комнату</button>
  <div id="error"></div>
</div>

<div id="room">
  <div id="roomHeader">
    <div class="header-left">
      <span id="roomCode"></span>
      <span id="roomPeers" class="room-peers"></span>
    </div>
    <button id="leaveBtn">Выйти</button>
  </div>
  <div id="faces">
    <video id="localVideo" autoplay muted playsinline></video>
    <div id="screenContainer"><video id="screenVideo" autoplay playsinline></video></div>
    <div id="peerList"></div>
  </div>
  <div id="controls">
    <button id="micBtn" class="ctrl-btn" title="Микрофон">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button id="pttBtn" class="ctrl-btn" title="Рация (держать)" style="display:none">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h.01M10 12h.01M14 12h.01M18 12h.01"/><line x1="6" y1="16" x2="18" y2="16"/><path d="M6 6V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/></svg>
    </button>
    <button id="camBtn" class="ctrl-btn" title="Камера">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    </button>
    <button id="toggleCamsBtn" class="ctrl-btn ctrl-btn-sm screen-only" title="Показать/скрыть камеры">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <button id="fullscreenBtn" class="ctrl-btn ctrl-btn-sm" title="Полный экран">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>
  </div>
  <div id="statusToast"></div>
</div>

<script src="socket.io.min.js"></script>
<script src="app.js?v=13"></script>
</body>
</html>
