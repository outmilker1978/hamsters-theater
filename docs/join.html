<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Hamsters — вход</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/outmilker1978/hamsters-theater/master/icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0f;
      color: #e8e8ed;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #1a1520;
      border: 1px solid #2e2638;
      border-radius: 24px;
      padding: 48px 40px 40px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }
    .logo span {
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.3px;
      color: #e8e8ed;
    }
    .room-label {
      font-size: 14px;
      color: #8a7a9a;
      margin-bottom: 4px;
    }
    .room-code {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #c285e4;
      margin-bottom: 36px;
      text-shadow: 0 0 24px rgba(194,133,228,0.2);
    }
    .open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: #c285e4;
      color: #0d0d0f;
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
    }
    .open-btn:hover {
      background: #dbb5f0;
    }
    .open-btn:active {
      transform: scale(0.97);
    }
    .open-btn img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }
    .open-btn .btn-title {
      display: block;
      font-size: 16px;
      line-height: 1.3;
    }
    .open-btn .btn-sub {
      display: block;
      font-size: 12px;
      font-weight: 400;
      opacity: 0.8;
    }
    .open-btn .btn-text {
      text-align: left;
    }
    .hint {
      margin-top: 24px;
      font-size: 13px;
      color: #5a4a6a;
      line-height: 1.5;
    }
    .hint a {
      color: #9a5fc2;
      text-decoration: none;
    }
    .hint a:hover {
      color: #c285e4;
    }
    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      .room-code { font-size: 40px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/outmilker1978/hamsters-theater/master/icon.png" alt="TV Hamsters">
      <span>TV Hamsters</span>
    </div>
    <div class="room-label">Палата</div>
    <div class="room-code" id="roomCode">--</div>
    <button class="open-btn" id="openBtn">
      <img src="https://raw.githubusercontent.com/outmilker1978/hamsters-theater/master/icon.png" alt="">
      <span class="btn-text">
        <span class="btn-title">TV Hamsters</span>
        <span class="btn-sub">Открыть программу</span>
      </span>
    </button>
    <div class="hint">
      Если программа не открылась — <a href="/">скачайте</a> её, запустите и нажмите на кнопку ещё раз.
    </div>
  </div>
  <script>
    const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) && !/Windows|Mac|Linux/i.test(navigator.userAgent);
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '';
    if (isMobile && code) {
      window.location.replace('/mobile/?code=' + code);
    }
    document.getElementById('roomCode').textContent = code || '--';
    const btn = document.getElementById('openBtn');
    btn.onclick = function() {
      window.location.href = 'hamsters://join?code=' + code;
      pollLocalServer();
    };
    function pollLocalServer() {
      let attempts = 0;
      const iv = setInterval(() => {
        attempts++;
        fetch('http://localhost:32456/ping', { mode: 'cors' })
          .then(r => { if (r.ok) { clearInterval(iv); sendCode(); } })
          .catch(() => { if (attempts > 60) clearInterval(iv); });
      }, 500);
    }
    function sendCode() {
      fetch('http://localhost:32456/join?code=' + encodeURIComponent(code), { mode: 'cors' })
        .then(() => {
          btn.textContent = '✅ Подключаюсь…';
          btn.disabled = true;
        })
        .catch(() => {});
    }
  </script>
</body>
</html>
