name: Release to Telegram

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram
        env:
          TAG: ${{ github.event.release.tag_name || 'v1.7.5' }}
          NOTES: ${{ github.event.release.body || 'Новый релиз с улучшениями' }}
        run: |
          # SVG-баннер
          cat > banner.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="780" height="440">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#1a1a2e"/>
                <stop offset="100%" style="stop-color:#0f0f1a"/>
              </linearGradient>
            </defs>
            <rect width="780" height="440" fill="url(#bg)" rx="20"/>
            <text x="60" y="70" font-family="sans-serif" font-size="40" font-weight="bold" fill="#b088f0">TV Hamsters</text>
            <text x="60" y="250" font-family="sans-serif" font-size="70" font-weight="bold" fill="#ffffff">${TAG}</text>
            <text x="60" y="310" font-family="sans-serif" font-size="24" fill="#aaaaaa">Новый релиз</text>
            <text x="60" y="410" font-family="sans-serif" font-size="16" fill="#666666">tvhamsters.outmilk.online</text>
          </svg>
          SVGEOF
          
          SUMMARY=$(echo "$NOTES" | head -1)
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -F chat_id="162363099" \
            -F photo="@banner.svg" \
            -F parse_mode="HTML" \
            -F "caption=<b>${TAG}</b>
          ${SUMMARY}

          🔗 tvhamsters.outmilk.online"