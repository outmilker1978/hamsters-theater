name: Release to Telegram

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram
        env:
          TAG: ${{ github.event.release.tag_name || 'v1.7.5' }}
          VERSION: ${{ github.event.release.tag_name || '1.7.5' }}
          NOTES: ${{ github.event.release.body || 'Новые возможности и улучшения' }}
        run: |
          # Берём первую строку из описания (до первого переноса)
          SUMMARY=$(echo "$NOTES" | head -1)
          
          # Формируем подпись
          cat > caption.txt << CAPTIONEOF
          <b>⚡ TV Hamsters $VERSION</b>
          
          $SUMMARY
          
          🔗 Скачать: https://github.com/outmilker1978/hamsters-theater/releases/tag/$TAG
          🌐 Сайт: tvhamsters.outmilk.online
          CAPTIONEOF
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -F chat_id="@tvhamsters" \
            -F photo="https://raw.githubusercontent.com/outmilker1978/hamsters-theater/master/icon.png" \
            -F parse_mode="HTML" \
            -F "caption=@caption.txt"