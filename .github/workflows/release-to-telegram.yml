name: Release to Telegram

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send release notification to Telegram channel
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: -1003813372615
        run: |
          TAG="${{ github.event.release.tag_name }}"
          NAME="${{ github.event.release.name }}"
          URL="${{ github.event.release.html_url }}"
          BODY="${{ github.event.release.body }}"

          # Fallback for workflow_dispatch (no release event)
          if [ -z "$TAG" ]; then
            REL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest")
            TAG=$(echo "$REL" | jq -r '.tag_name')
            NAME=$(echo "$REL" | jq -r '.name')
            URL=$(echo "$REL" | jq -r '.html_url')
            BODY=$(echo "$REL" | jq -r '.body')
          fi

          printf '%s\n' \
            '<b>🎬 TV Hamsters — новый релиз</b>' '' \
            '<b>Версия:</b> '"${TAG}" \
            '<b>Название:</b> '"${NAME}" '' \
            '<b>Что нового:</b>' "${BODY}" '' \
            "🔗 ${URL}" \
            '🌐 tvhamsters.outmilk.online' > /tmp/msg.txt

          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text@/tmp/msg.txt"