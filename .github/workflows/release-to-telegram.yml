name: Release to Telegram

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check bot chats
        run: |
          echo "=== Какие чаты видит бот ==="
          RESPONSE=$(curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getUpdates")
          echo "$RESPONSE"
          echo ""
          echo "=== Пробуем отправить сообщение ==="
          RESPONSE2=$(curl -s -w "\n%{http_code}" -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="@tvhamsters" \
            -d text="test")
          HTTP_CODE=$(echo "$RESPONSE2" | tail -1)
          BODY2=$(echo "$RESPONSE2" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "Response: $BODY2"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi