name: Release to Telegram
on:
  release: {types: [published]}
  workflow_dispatch: {}
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Install ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick fonts-dejavu-core
      - name: Generate + send
        env:
          TAG: ${{ github.event.release.tag_name || 'v1.7.7' }}
          NOTES: ${{ github.event.release.body || 'Новый релиз с улучшениями' }}
          CHAT: '162363099'
        run: |
          curl -s -o icon.png https://raw.githubusercontent.com/outmilker1978/hamsters-theater/master/icon.png
          BG=$(convert icon.png -crop 1x1+0+0 -format '%[hex:u.p{0,0}]' info:-)
          convert icon.png -alpha on -fuzz 25% -transparent "#$BG" -resize 160x120 icon-small.png

          convert -size 780x440 gradient:'#7c3aed'-'#c084fc' -font DejaVu-Sans-Bold \
            -gravity northwest -pointsize 14 -fill '#e9d5ff' -annotate +200+18 'TV Hamsters' \
            -gravity northwest -pointsize 52 -fill white -annotate +200+45 'НОВЫЙ РЕЛИЗ' \
            -gravity northwest -pointsize 52 -fill '#f3e8ff' -annotate +200+118 "$TAG" \
            -gravity south -pointsize 14 -fill '#e9d5ff' -annotate +0+20 'tvhamsters.outmilk.online' \
            out.png

          composite -geometry +25+18 icon-small.png out.png out.png

          cat > cap.txt << EOF
          <b>TV Hamsters $TAG</b>
          $(echo "$NOTES" | head -1)
          tvhamsters.outmilk.online
          EOF

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -F chat_id="$CHAT" \
            -F photo="@out.png" \
            -F parse_mode="HTML" \
            --form-string "caption=$(cat cap.txt)"