name: Release to Telegram
on:
  release: {types: [published]}
  workflow_dispatch: {}
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Install ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick fonts-dejavu-core
      - name: Fetch release data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
            echo "NOTES<<NOTESEOF" >> $GITHUB_ENV
            echo "${{ github.event.release.body }}" >> $GITHUB_ENV
            echo "NOTESEOF" >> $GITHUB_ENV
          else
            echo "fetching latest release..."
            LATEST=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/outmilker1978/hamsters-theater/releases/latest)
            TAG=$(echo "$LATEST" | jq -r '.tag_name')
            BODY=$(echo "$LATEST" | jq -r '.body | if . then . else "" end')
            echo "TAG=$TAG" >> $GITHUB_ENV
            echo "NOTES<<NOTESEOF" >> $GITHUB_ENV
            echo "$BODY" >> $GITHUB_ENV
            echo "NOTESEOF" >> $GITHUB_ENV
          fi
      - name: Generate + send
        env:
          CHAT: '162363099'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s -o icon_raw.png https://raw.githubusercontent.com/outmilker1978/hamsters-theater/master/icon.png
          BG=$(convert icon_raw.png -crop 1x1+0+0 -format '%[hex:u.p{0,0}]' info:-)
          convert icon_raw.png -alpha on -fuzz 25% -transparent "#$BG" -resize 220x220 icon.png

          LABEL=$(printf '\xd0\x9d\xd0\x9e\xd0\x92\xd0\xab\xd0\x99 \xd0\xa0\xd0\x95\xd0\x9b\xd0\x98\xd0\x97')

          convert -size 780x260 gradient:'#7c3aed'-'#c084fc' -font DejaVu-Sans-Bold \
            -gravity northwest -pointsize 14 -fill '#e9d5ff' -annotate +260+15 'TV Hamsters' \
            -gravity northwest -pointsize 40 -fill white -annotate +260+40 "$LABEL" \
            -gravity northwest -pointsize 40 -fill '#f3e8ff' -annotate +260+95 "$TAG" \
            -gravity south -pointsize 12 -fill '#e9d5ff' -annotate +0+15 'tvhamsters.outmilk.online' \
            out.png

          composite -geometry +25+0 icon.png out.png out.png

          PARAS=$(echo "$NOTES" | awk -v RS= -v ORS='\n\n' '{
            if (NR == 1) print
            else if (NR == 2) print
            else if (NR == 3) { split($0,a,"\n"); print a[1] }
            else exit
          }' | head -c 700)

          cat > cap.txt << EOF
          <b>TV Hamsters $TAG</b>
          $PARAS

          --- Details: https://tvhamsters.outmilk.online/blog.html

          Site: https://tvhamsters.outmilk.online
          Windows: https://github.com/outmilker1978/hamsters-theater/releases/tag/$TAG
          Mobile: https://tvhamsters.outmilk.online/mobile/
          EOF

          echo "=== caption length ==="
          wc -c cap.txt
          echo "=== caption preview ==="
          head -c 200 cap.txt
          echo ""

          HTTP=$(curl -s -w "%{http_code}" -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendPhoto" \
            -F chat_id="$CHAT" \
            -F photo="@out.png" \
            -F parse_mode="HTML" \
            -F "caption=<cap.txt" -o resp.json)
          echo "HTTP: $HTTP"
          cat resp.json
          if [ "$HTTP" != "200" ]; then exit 1; fi