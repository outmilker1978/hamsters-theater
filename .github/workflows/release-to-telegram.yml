name: Release to Telegram

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram
        env:
          TAG: ${{ github.event.release.tag_name || 'v1.7.5' }}
          NOTES: ${{ github.event.release.body || 'Новый релиз с улучшениями' }}
        run: |
          SUMMARY=$(echo "$NOTES" | head -1 | head -c 200)
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" \
            -F chat_id="162363099" \
            -F "photo=https://raw.githubusercontent.com/outmilker1978/hamsters-theater/master/icon.png" \
            -F "caption=<b>TV Hamsters $TAG</b>

          $SUMMARY

          ⬇️ Скачать: https://github.com/outmilker1978/hamsters-theater/releases/tag/$TAG"