<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<style>
html, body { height: 100%; margin: 0; }
body {
  background: rgba(18,14,20,0.3);
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  border-radius: 16px 16px 0 0;
}
#chat-wrap {
  display: flex; flex-direction: column;
  height: 100%; padding: 8px 10px; gap: 4px;
}
.chat-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: #c285e4; font-weight: 600;
}
.chat-close {
  background: none; border: none; color: #888;
  cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px;
}
.chat-msgs {
  flex: 1; overflow-y: auto;
  font-size: 11px; display: flex;
  flex-direction: column; gap: 3px;
  min-height: 0;
}
.chat-msg {
  padding: 3px 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 6px; line-height: 1.3;
}
.chat-msg-author { color: #c285e4; font-weight: 600; margin-right: 4px; }
.chat-msg-text { color: #e8d8f0; }
.chat-input-row { display: flex; gap: 4px; }
.chat-input {
  flex: 1; padding: 5px 8px;
  border-radius: 6px; border: 1px solid #333;
  background: #1a1620; color: #e8d8f0;
  font-size: 12px; outline: none;
}
.chat-send {
  width: 28px; height: 28px;
  border-radius: 50%; border: none;
  background: #7c3aed; color: #fff;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div id="chat-wrap">
  <div class="chat-header">
    <span>&#x427;&#x430;&#x442;</span>
    <button id="chatClose" class="chat-close">&times;</button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" class="chat-input" placeholder="&#x41D;&#x430;&#x43F;&#x438;&#x441;&#x430;&#x442;&#x44C;..." maxlength="500">
    <button id="chatSend" class="chat-send">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
<script src="panel-chat.js"></script>
</body>
</html>
