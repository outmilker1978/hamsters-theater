<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    .reaction-float {
      position: fixed;
      font-size: 64px;
      pointer-events: none;
      z-index: 99999;
      animation: floatBubble 6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes floatBubble {
      0% { opacity: 1; transform: translateX(0) translateY(0) scale(0.3) rotate(0deg); }
      20% { opacity: 1; transform: translateX(30px) translateY(-80px) scale(0.7) rotate(8deg); }
      40% { transform: translateX(-25px) translateY(-180px) scale(0.95) rotate(-5deg); }
      60% { transform: translateX(20px) translateY(-280px) scale(1.05) rotate(4deg); }
      80% { opacity: 0.5; transform: translateX(-10px) translateY(-380px) scale(0.85) rotate(-3deg); }
      100% { opacity: 0; transform: translateX(0) translateY(-480px) scale(0.4) rotate(0deg); }
    }
  </style>
</head>
<body>
  <script src="reactions.js"></script>
</body>
</html>
