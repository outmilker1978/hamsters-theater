<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<style>
html, body { height: 100%; margin: 0; }
body {
  background: rgba(18,14,20,0.3);
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  border-radius: 16px 16px 0 0;
}
#react-wrap {
  display: flex; align-items: center;
  justify-content: center; gap: 8px;
  height: 100%; padding: 0 12px;
}
.react-btn {
  width: 34px; height: 34px;
  border-radius: 50%; border: none;
  background: rgba(255,255,255,0.08);
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center;
  justify-content: center;
}
.react-btn:hover { background: rgba(255,255,255,0.16); }
.react-close {
  background: none; border: none; color: #888;
  cursor: pointer; font-size: 16px; line-height: 1;
  margin-left: auto;
}
</style>
</head>
<body>
<div id="react-wrap">
  <button class="react-btn" data-emoji="&#x2764;&#xFE0F;">&#x2764;&#xFE0F;</button>
  <button class="react-btn" data-emoji="&#x1F602;">&#x1F602;</button>
  <button class="react-btn" data-emoji="&#x1F525;">&#x1F525;</button>
  <button class="react-btn" data-emoji="&#x1F97A;">&#x1F97A;</button>
  <button class="react-btn" data-emoji="&#x1F4A9;">&#x1F4A9;</button>
  <button id="reactClose" class="react-close">&times;</button>
</div>
<script src="panel-reactions.js"></script>
</body>
</html>
