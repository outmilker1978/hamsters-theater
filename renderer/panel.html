<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<style>
body {
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-width: 520px;
}
#panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  height: 100%;
  background: rgba(18, 14, 20, 0.6);
  border-radius: 16px;
}
#panel-chat {
  width: 100%; flex: 1; display: none;
  flex-direction: column; padding: 8px 10px 4px; gap: 4px;
  min-height: 0;
}
#panel-chat.open { display: flex; }
.panel-chat-header {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: #c285e4; font-weight: 600;
}
.panel-chat-close {
  background: none; border: none; color: #888;
  cursor: pointer; font-size: 16px; line-height: 1; padding: 0 4px;
}
.panel-chat-msgs {
  flex: 1; overflow-y: auto;
  font-size: 11px; display: flex;
  flex-direction: column; gap: 3px;
  min-height: 0; max-height: 140px;
}
.panel-chat-msg {
  padding: 3px 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 6px; line-height: 1.3;
}
.panel-chat-msg-author { color: #c285e4; font-weight: 600; margin-right: 4px; }
.panel-chat-msg-text { color: #e8d8f0; }
.panel-chat-input-row { display: flex; gap: 4px; }
.panel-chat-input {
  flex: 1; padding: 5px 8px;
  border-radius: 6px; border: 1px solid #333;
  background: #1a1620; color: #e8d8f0;
  font-size: 12px; outline: none;
}
.panel-chat-send {
  width: 28px; height: 28px;
  border-radius: 50%; border: none;
  background: #7c3aed; color: #fff;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
#panel-buttons {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 12px;
  gap: 6px;
}
.panel-reactions {
  display: none;
  gap: 6px;
  padding: 6px 12px 0;
  justify-content: center;
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(18, 14, 20, 0.85);
  border-radius: 20px;
  padding: 6px 12px;
  white-space: nowrap;
}
.panel-reactions.open { display: flex; }
.panel-reaction-btn {
  width: 34px; height: 34px;
  border-radius: 50%; border: none;
  background: rgba(255,255,255,0.08);
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center;
  justify-content: center; transition: background 0.15s;
}
.panel-reaction-btn:hover { background: rgba(255,255,255,0.16); }
.control-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--bg-elevated);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease, color 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.control-btn:hover {
  background: #30283a;
  transform: translateY(-2px);
}
.control-btn:active {
  transform: scale(0.9) translateY(0);
  transition-duration: 0.05s;
}
.control-btn.danger {
  background: var(--danger-dark);
  color: #f0c0c8;
}
.control-btn.danger:hover {
  background: var(--danger);
  color: #fff;
  box-shadow: 0 0 20px rgba(212, 90, 106, 0.4);
}
.control-btn.active {
  background: var(--accent);
  box-shadow: 0 0 16px var(--glow);
  color: #0a0810;
}
.control-btn.active.off {
  background: var(--bg-elevated);
  box-shadow: none;
  color: var(--text-muted);
  animation: none;
}
.control-btn.sharing {
  background: var(--accent);
  box-shadow: 0 0 16px var(--glow);
  color: #0a0810;
}
.control-btn svg { width: 22px; height: 22px; pointer-events: none; }
.ptt-label {
  position: absolute;
  bottom: -2px;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: rgba(0,0,0,0.3);
  padding: 1px 5px;
  border-radius: 8px;
  color: inherit;
}
</style>
</head>
<body>
<div id="panel">
  <div id="panel-chat">
    <div class="panel-chat-header">
      <span>&#x427;&#x430;&#x442;</span>
      <button id="panelChatClose" class="panel-chat-close">&times;</button>
    </div>
    <div class="panel-chat-msgs" id="panelChatMsgs"></div>
    <div class="panel-chat-input-row">
      <input type="text" id="panelChatInput" class="panel-chat-input" placeholder="&#x41D;&#x430;&#x43F;&#x438;&#x441;&#x430;&#x442;&#x44C;..." maxlength="500">
      <button id="panelChatSend" class="panel-chat-send">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
  <div id="panel-buttons" style="position:relative">
    <div id="panel-reactions" class="panel-reactions">
      <button class="panel-reaction-btn" data-emoji="&#x2764;&#xFE0F;">&#x2764;&#xFE0F;</button>
      <button class="panel-reaction-btn" data-emoji="&#x1F602;">&#x1F602;</button>
      <button class="panel-reaction-btn" data-emoji="&#x1F525;">&#x1F525;</button>
      <button class="panel-reaction-btn" data-emoji="&#x1F97A;">&#x1F97A;</button>
      <button class="panel-reaction-btn" data-emoji="&#x1F4A9;">&#x1F4A9;</button>
    </div>
    <button id="btn-cam" class="control-btn active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </button>
    <button id="btn-mic" class="control-btn active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button id="btn-ptt" class="control-btn ptt" style="display:none">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span class="ptt-label">Пробел</span>
    </button>
    <button id="btn-chat" class="control-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg>
    </button>
    <button id="btn-reaction" class="control-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9" r="1"/><circle cx="15" cy="9" r="1"/><path d="M8 14c0 0 1.5 2 4 2s4-2 4-2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button id="btn-screen" class="control-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
    </button>
    <button id="btn-leave" class="control-btn danger">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.23 8.06c-.53-.55-.46-1.41.16-1.87.78-.59 1.72-.93 2.74-.98 2.26-.09 4.23.94 5.34 2.42.43.57.31 1.39-.29 1.78-.6.39-1.42.27-1.85-.3-.65-.85-1.74-1.39-2.97-1.34-.54.03-1.05.18-1.49.43-.54.3-1.22.26-1.64-.14z"/><path d="M9.15 10.42c-.46-.33-1.11-.27-1.5.15-.39.42-.33 1.07.13 1.4l2.05 1.48c.37.27.69.64.84 1.09.53 1.6 1.52 3.13 2.94 4.32.44.37 1.1.32 1.47-.12.37-.44.32-1.1-.12-1.47-.88-.74-1.53-1.63-1.96-2.6l-1.93-1.39c-.33-.21-.65-.52-.92-.86z"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
    </button>
  </div>
</div>
<script src="panel.js"></script>
</body>
</html>
