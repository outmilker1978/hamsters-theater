<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="style.css">
<style>
body {
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
}
#panel {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  gap: 10px;
  height: 100%;
  background: rgba(18, 14, 20, 0.85);
  border-radius: 16px;
}
.control-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--bg-elevated);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease, color 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.control-btn:hover {
  background: #30283a;
  transform: translateY(-2px);
}
.control-btn:active {
  transform: scale(0.9) translateY(0);
  transition-duration: 0.05s;
}
.control-btn.danger {
  background: var(--danger-dark);
  color: #f0c0c8;
}
.control-btn.danger:hover {
  background: var(--danger);
  color: #fff;
  box-shadow: 0 0 20px rgba(212, 90, 106, 0.4);
}
.control-btn.active {
  background: var(--accent);
  box-shadow: 0 0 16px var(--glow);
  color: #0a0810;
}
.control-btn.active.off {
  background: var(--bg-elevated);
  box-shadow: none;
  color: var(--text-muted);
  animation: none;
}
.control-btn.sharing {
  background: var(--accent);
  box-shadow: 0 0 16px var(--glow);
  color: #0a0810;
}
.control-btn svg { width: 22px; height: 22px; pointer-events: none; }
.ptt-label {
  position: absolute;
  bottom: -2px;
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: rgba(0,0,0,0.3);
  padding: 1px 5px;
  border-radius: 8px;
  color: inherit;
}
</style>
</head>
<body>
<div id="panel">
  <button id="btn-cam" class="control-btn active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
  </button>
  <button id="btn-mic" class="control-btn active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <button id="btn-ptt" class="control-btn ptt" style="display:none">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <span class="ptt-label">Пробел</span>
  </button>
  <button id="btn-screen" class="control-btn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
  </button>
  <button id="btn-leave" class="control-btn danger">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.23 8.06c-.53-.55-.46-1.41.16-1.87.78-.59 1.72-.93 2.74-.98 2.26-.09 4.23.94 5.34 2.42.43.57.31 1.39-.29 1.78-.6.39-1.42.27-1.85-.3-.65-.85-1.74-1.39-2.97-1.34-.54.03-1.05.18-1.49.43-.54.3-1.22.26-1.64-.14z"/><path d="M9.15 10.42c-.46-.33-1.11-.27-1.5.15-.39.42-.33 1.07.13 1.4l2.05 1.48c.37.27.69.64.84 1.09.53 1.6 1.52 3.13 2.94 4.32.44.37 1.1.32 1.47-.12.37-.44.32-1.1-.12-1.47-.88-.74-1.53-1.63-1.96-2.6l-1.93-1.39c-.33-.21-.65-.52-.92-.86z"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
  </button>
</div>
<script src="panel.js"></script>
</body>
</html>
