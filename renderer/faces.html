<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: rgba(18,14,20,0.3);
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100vh;
      border: 1px solid rgba(124,58,237,0.15);
      border-radius: 16px;
    }
    body:hover {
      background: rgba(18,14,20,0.5);
      border-color: rgba(124,58,237,0.25);
    }
    #drag-handle {
      position: absolute; top: 0; left: 0; right: 0; height: 22px;
      -webkit-app-region: drag;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #6b5b7a; cursor: move;
      z-index: 10;
      border-radius: 16px 16px 0 0;
    }
    #faces-container {
      display: flex;
      gap: 8px;
      padding: 26px 8px 8px;
      height: 100%;
      overflow-x: auto;
      align-items: stretch;
    }
    .face-card {
      position: relative;
      min-width: 100px;
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0810;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .face-card .img-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }
    .face-card .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .face-card .no-video {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 11px;
      width: 100%;
    }
    .face-card .label {
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      padding: 3px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(0,0,0,0.5);
      width: 100%;
      flex-shrink: 0;
    }
    .face-card .vol-container {
      position: absolute;
      right: 2px;
      top: 2px;
      bottom: 2px;
      width: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .face-card input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 4px;
      height: 60px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      writing-mode: vertical-lr;
      direction: rtl;
    }
    .face-card input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .no-faces {
      width: 100%;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      align-self: center;
    }
    @keyframes reactionFade {
      0% { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-80%) scale(1); }
    }
    @keyframes chatFadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="drag-handle">...</div>
  <div id="faces-container"></div>
  <script src="faces.js"></script>
</body>
</html>
